<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>محرر قائمة استراحة مهنا</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Changa:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f3f8f8;color:#12333b;font-family:Changa,system-ui,sans-serif}.wrap{width:min(1000px,94%);margin:30px auto}.panel{background:#fff;border-radius:22px;padding:22px;box-shadow:0 16px 40px #0b59631c;margin-bottom:16px}h1,h2{margin-top:0}.hint{color:#66818a}.actions{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}button,a.button{border:0;border-radius:12px;padding:10px 14px;background:#087f8c;color:#fff;font:600 14px Changa;cursor:pointer;text-decoration:none}.secondary{background:#e9f4f3!important;color:#075866!important}.danger{background:#b84040!important}.category{border:1px solid #dfeceb;border-radius:16px;padding:14px;margin:12px 0}.category-head{display:grid;grid-template-columns:1fr 100px auto;gap:8px}.item{display:grid;grid-template-columns:minmax(0,1fr) 100px auto;gap:8px;margin-top:8px}input{width:100%;padding:10px;border:1px solid #cfdfdd;border-radius:10px;font:inherit}textarea{width:100%;min-height:220px;direction:ltr;text-align:left;font:13px ui-monospace,monospace;border:1px solid #cfdfdd;border-radius:12px;padding:12px}@media(max-width:650px){.category-head,.item{grid-template-columns:1fr 80px}.category-head button,.item button{grid-column:1/-1}}
  </style>
</head>
<body><main class="wrap">
  <section class="panel"><h1>محرر القائمة</h1><p class="hint">عدّل الفئات والأصناف، ثم نزّل ملف <b>menu-data.js</b> واستبدله في مشروع Render. التعديل هنا لا ينشر تلقائياً بدون قاعدة بيانات.</p><div class="actions"><a class="button secondary" href="index.html">معاينة القائمة</a><button id="download">تنزيل ملف القائمة</button><button id="copy" class="secondary">نسخ المحتوى</button></div></section>
  <section class="panel"><h2>بيانات المطعم</h2><label>اسم المطعم<input id="rname"></label><label>الموقع<input id="rsubtitle"></label><label>الموسم<input id="rseason"></label><label>ملاحظة<input id="rnote"></label><label>الهواتف (مفصولة بفاصلة)<input id="rphones" dir="ltr"></label></section>
  <section class="panel"><div class="actions"><button id="add-category">+ إضافة فئة</button></div><div id="categories"></div></section>
  <section class="panel"><h2>المحتوى الجاهز</h2><textarea id="output" readonly></textarea></section>
</main><script src="menu-data.js"></script><script>
let model=structuredClone(window.MENU_DATA);const $=s=>document.querySelector(s);const esc=s=>String(s).replaceAll('&','&amp;').replaceAll('"','&quot;').replaceAll('<','&lt;');
function syncRestaurant(){model.restaurant.name=$('#rname').value;model.restaurant.subtitle=$('#rsubtitle').value;model.restaurant.season=$('#rseason').value;model.restaurant.note=$('#rnote').value;model.restaurant.phones=$('#rphones').value.split(',').map(x=>x.trim()).filter(Boolean);updateOutput()}
function render(){const r=model.restaurant;$('#rname').value=r.name;$('#rsubtitle').value=r.subtitle;$('#rseason').value=r.season;$('#rnote').value=r.note;$('#rphones').value=r.phones.join(', ');$('#categories').innerHTML=model.categories.map((c,ci)=>`<div class="category"><div class="category-head"><input value="${esc(c.name)}" data-cname="${ci}"><input value="${esc(c.icon)}" data-cicon="${ci}"><button class="danger" data-delcat="${ci}">حذف الفئة</button></div><div>${c.items.map((it,ii)=>`<div class="item"><input value="${esc(it.name)}" data-iname="${ci},${ii}"><input type="number" step="0.5" value="${it.price}" data-iprice="${ci},${ii}"><button class="danger" data-delitem="${ci},${ii}">حذف</button></div>`).join('')}</div><div class="actions"><button class="secondary" data-additem="${ci}">+ صنف</button></div></div>`).join('');updateOutput()}
function updateOutput(){const safe=JSON.stringify(model,null,2).replace(/</g,'\\u003c');$('#output').value=`window.MENU_DATA = ${safe};\n`}
['#rname','#rsubtitle','#rseason','#rnote','#rphones'].forEach(s=>$(s).addEventListener('input',syncRestaurant));
$('#categories').addEventListener('input',e=>{let el=e.target;if(el.dataset.cname!==undefined)model.categories[+el.dataset.cname].name=el.value;if(el.dataset.cicon!==undefined)model.categories[+el.dataset.cicon].icon=el.value;if(el.dataset.iname){let[c,i]=el.dataset.iname.split(',').map(Number);model.categories[c].items[i].name=el.value}if(el.dataset.iprice){let[c,i]=el.dataset.iprice.split(',').map(Number);model.categories[c].items[i].price=Number(el.value)}updateOutput()});
$('#categories').addEventListener('click',e=>{let el=e.target;if(el.dataset.delcat!==undefined){model.categories.splice(+el.dataset.delcat,1);render()}if(el.dataset.delitem){let[c,i]=el.dataset.delitem.split(',').map(Number);model.categories[c].items.splice(i,1);render()}if(el.dataset.additem!==undefined){model.categories[+el.dataset.additem].items.push({name:'صنف جديد',price:0});render()}});
$('#add-category').onclick=()=>{model.categories.push({id:`category-${Date.now()}`,name:'فئة جديدة',icon:'🍽️',items:[]});render()};
$('#download').onclick=()=>{updateOutput();const blob=new Blob([$('#output').value],{type:'text/javascript;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='menu-data.js';a.click();URL.revokeObjectURL(a.href)};
$('#copy').onclick=async()=>{updateOutput();await navigator.clipboard.writeText($('#output').value);$('#copy').textContent='تم النسخ ✓';setTimeout(()=>$('#copy').textContent='نسخ المحتوى',1500)};render();
</script></body></html>
