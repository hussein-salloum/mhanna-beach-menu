<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#062d3a" />
  <meta name="description" content="قائمة استراحة مهنا على شاطئ صور" />
  <title>استراحة مهنا | قائمة الطعام</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Changa:wght@400;500;600;700&family=Reem+Kufi:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero" id="top">
    <nav class="topbar">
      <a class="mini-brand" href="#top" aria-label="العودة إلى الأعلى">36</a>
      <div class="top-actions">
        <a href="#menu-start">القائمة</a>
        <a class="call-link" href="#contact">اتصل بنا</a>
      </div>
    </nav>

    <div class="hero-content">
      <p class="eyebrow">TYRE · LEBANON</p>
      <h1 id="restaurant-name"></h1>
      <p class="subtitle" id="restaurant-subtitle"></p>
      <div class="hero-buttons">
        <a class="primary-button" href="#menu-start">تصفح القائمة</a>
        <a class="glass-button" href="#contact">للحجز والاستفسار</a>
      </div>
    </div>

    <div class="hero-bottom">
      <span id="season"></span>
      <span id="restaurant-note"></span>
    </div>
  </header>

  <main>
    <section class="menu-shell" id="menu-start">
      <div class="menu-top">
        <div>
          <p class="section-kicker">MENU</p>
          <h2 id="active-title">جميع الأصناف</h2>
        </div>
        <label class="search-box">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.4-3.4"></path></svg>
          <input id="search" type="search" placeholder="ابحث عن صنف أو مشروب…" autocomplete="off" />
        </label>
      </div>

      <div class="category-rail-wrap">
        <div id="category-cards" class="category-rail" aria-label="أقسام القائمة"></div>
      </div>

      <div id="active-filter" class="active-filter" hidden></div>
      <section id="menu" class="menu-grid" aria-live="polite"></section>
      <p id="empty-state" class="empty-state" hidden>لم يتم العثور على صنف مطابق.</p>
    </section>

    <section class="notice-card">
      <span>!</span>
      <div><h2>ملاحظة مهمة</h2><p id="rules"></p></div>
    </section>

    <section class="contact-card" id="contact">
      <div>
        <p class="section-kicker light">RESERVATIONS</p>
        <h2>احجز طاولتك على البحر</h2>
        <p>اتصل بنا مباشرة للحجز أو للاستفسار عن الأصناف والأسعار.</p>
      </div>
      <div id="phone-buttons" class="phone-buttons"></div>
    </section>
  </main>

  <footer>
    <strong id="footer-name"></strong>
    <span>شاطئ صور · لبنان · 2026</span>
  </footer>

  <script src="menu-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
